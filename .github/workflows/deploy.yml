name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.event.inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build release artifact
        run: ./gradlew clean build

      - name: Prepare release files
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ github.event.inputs.tag_name || github.ref_name }}"
          jar_path="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -n 1)"
          if [[ -z "${jar_path}" ]]; then
            echo "No jar artifact found in build/libs" >&2
            exit 1
          fi

          mkdir -p dist
          artifact_name="BundleManager-${release_tag}.jar"
          cp "${jar_path}" "dist/${artifact_name}"

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${artifact_name}" > "dist/${artifact_name}.sha256"
          else
            shasum -a 256 "dist/${artifact_name}" > "dist/${artifact_name}.sha256"
          fi

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: BundleManager-release-${{ steps.prepare.outputs.release_tag }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare.outputs.release_tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.jar
            dist/*.sha256
